<script>

function calculate(){

let shift =
parseFloat(document.getElementById("shift").value);

let days =
parseFloat(document.getElementById("days").value) || 0;

let rate =
parseFloat(document.getElementById("rate").value) || 0;

let night =
parseFloat(document.getElementById("night").value) || 0;

let weekend =
parseFloat(document.getElementById("weekend").value) || 0;

let totalHours = shift * days;

let basePay = totalHours * rate;

let nightBonus = night * 1.5;

let weekendBonus = weekend * 10;

let total =
basePay + nightBonus + weekendBonus;

document.getElementById("hours").innerHTML =
"Odpracované hodiny: " + totalHours + " h";

document.getElementById("nightPay").innerHTML =
"Nočný príplatok: " + nightBonus.toFixed(2) + " €";

document.getElementById("weekendPay").innerHTML =
"Víkendový príplatok: " + weekendBonus.toFixed(2) + " €";

document.getElementById("total").innerHTML =
total.toFixed(2) + " €";

}

</script>
