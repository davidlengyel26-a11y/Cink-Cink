<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cink-Cink</title>

<style>

body{
background:#111827;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.box{
background:#1f2937;
padding:20px;
border-radius:20px;
max-width:500px;
margin:auto;
}

h1{
text-align:center;
color:#60a5fa;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
font-size:17px;
}

.result{
margin-top:25px;
background:#111827;
padding:15px;
border-radius:12px;
}

.result p{
margin:8px 0;
font-size:18px;
}

.money{
font-size:28px;
font-weight:bold;
color:#4ade80;
text-align:center;
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h1>💸 Cink-Cink</h1>

<input type="text" id="name" placeholder="Meno zamestnanca">

<select id="shift">
<option value="8.5">Ranná (8.5h)</option>
<option value="8.5">Poobedná (8.5h)</option>
<option value="0">Voľno</option>
</select>

<input type="number" id="days" placeholder="Počet dní">

<input type="number" id="rate" placeholder="Hodinová mzda (€)">

<input type="number" id="night" placeholder="Nočné hodiny">

<input type="number" id="weekend" placeholder="Víkendové dni">

<button onclick="calculate()">
Vypočítať
</button>

<div class="result">

<p id="hours">Odpracované hodiny: 0 h</p>

<p id="nightPay">Nočný príplatok: 0 €</p>

<p id="weekendPay">Víkendový príplatok: 0 €</p>

<div class="money" id="total">
0 €
</div>

</div>

</div>

<script>

function calculate(){

let shift =
parseFloat(document.getElementById("shift").value);

let days =
parseFloat(document.getElementById("days").value) || 0;

let rate =
parseFloat(document.getElementById("rate").value) || 0;

let night =
parseFloat(document.getElementById("night").value) || 0;

let weekend =
parseFloat(document.getElementById("weekend").value) || 0;

let totalHours = shift * days;

let basePay = totalHours * rate;

let nightBonus = night * 1.5;

let weekendBonus = weekend * 10;

let total =
basePay + nightBonus + weekendBonus;

document.getElementById("hours").innerHTML =
"Odpracované hodiny: " + totalHours + " h";

document.getElementById("nightPay").innerHTML =
"Nočný príplatok: " + nightBonus.toFixed(2) + " €";

document.getElementById("weekendPay").innerHTML =
"Víkendový príplatok: " + weekendBonus.toFixed(2) + " €";

document.getElementById("total").innerHTML =
total.toFixed(2) + " €";

}

</script>

</body>
</html>
